services:
  # Backend Web Service
  - type: web
    name: retirepro-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        sync: false # Set as a Secret in Render UI
      - key: PORT
        value: 5050
      - key: FRONTEND_URL
        value: https://retiredpro.vercel.app
      - key: CLIENT_URL
        value: https://retiredpro.vercel.app

  # Frontend Static Site
  - type: web
    name: retirepro-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: retirepro-backend
          property: host
